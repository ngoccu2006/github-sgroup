<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card Hover Effect</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        .body-container {
            position: relative;
            width: 400px;
            height: 350px;
            top: 50px;
            left: 50px;
            overflow: hidden;
            border-radius: 4px;
            cursor: pointer;
            font-family: sans-serif;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(89, 98, 117, 0.6); 
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .content-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 20px;
        }
        
        .txt_holysadie {
            font-size: 24px;
            font-weight: bold;
            color: white;
            letter-spacing: 2px;
            transform: translateY(15px);
            transition: transform 0.4s ease;
        }

        .txt_holysadie strong{
            color: rgb(64, 12, 12);
        }
        
        .sub-text {
            margin-top: 25px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            text-transform: uppercase;
            line-height: 1.5;
            letter-spacing: 1px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .body-container:hover .overlay {
            opacity: 1;
        }

        .body-container:hover .txt_holysadie {
            transform: translateY(0);
        }

        .body-container:hover .sub-text {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="body-container">
        <img src="profile-image.jpg" alt="profile image">
        <div class="overlay"></div>
        <div class="content-container">
            <div class="txt_holysadie">HOLY<strong>SADIE</strong></div>
   
            <div class="sub-text">
                SADIE NEVER TOOK HER EYES OFF ME.<br>
                SHE HAD A DARK SOUL.
            </div>
        </div>
    </div>
</body>
</html>
