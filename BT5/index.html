<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(18, 18, 35);
            min-height: 100vh;
            overflow: hidden;
        }
        .body-container{
            display: flex;
            align-items: center;
            justify-content: center;
            width: auto;
            height: auto;
            gap: 15px;
            flex-direction: column;
        }

        .container1{
            display: flex;
            align-items: center;
            justify-content: center;
            width: auto;
            height: auto;
            gap: 20px;
            font-size: 16px;
        }
        .box1{
            width: 110px;
            height: 110px;
            background-color: blue;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            transform: translateX(0);
            transition: transform 0.2s ease;
        }

        .box1:hover{
            transform: translateX(20px);
        }

        .box2{
            width: 110px;
            height: 110px;
            background-color: blue;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            transform: rotate(0);
            transition: transform 0.3s ease;
        }

        .box2:hover{
            transform: rotate(45deg);
        }
        .box3{
            width: 110px;
            height: 110px;
            background-color: blue;
            border-radius: 4px;            
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            transform: scale(1);
            transition: transform 0.3s ease;
        }

        .box3:hover{
            transform: scale(1.2);
        }
        .box4{
            width: 110px;
            height: 110px;
            background-color: blue;
            border-radius: 4px;            
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            transform: rotate(0), translateY(0), scale(1);
            transition: transform 0.3s ease;
        }

        .box4:hover{
            transform: translateY(15px) scale(1.2) rotate(45deg);
        }

        .txt1{
            text-align: center;
            color: blue;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            margin: 5px 0;
        }

        .container2{
            display: flex;
            align-items: center;
            justify-content: center;
            width: auto;
            height: auto;
            gap: 20px;
            position: relative;
        }

        .img-card {
            position: relative;
            width: 150px;
            height: 150px;
            overflow: hidden;
        }

        .img-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .img-card:hover .overlay {
            opacity: 1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(45, 52, 54, 0.7);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .box5{
            width: 110px;
            height: 110px;
            background-color: rgb(192, 18, 18);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            animation: animation-box5 0.4s ease-in-out infinite normal;
        }

        @keyframes animation-box5{
            0%   { transform: translateY(0); }
            50%  { transform: translateY(25px); }
            100% { transform: translateY(0); }
        }

        .box6{
            width: 110px;
            height: 110px;
            background-color: rgb(219, 219, 29);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            animation: animation-box6 1s ease-in-out infinite normal;
        }

        @keyframes animation-box6{
            0%   { transform: rotate(0); }
            50%  { transform: rotate(180deg); }
            100% { transform: rotate(360deg); }
        }

        .box7{
            width: 110px;
            height: 110px;
            background-color: rgb(12, 128, 12);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            animation: animation-box7 0.5s ease-in-out infinite normal;
        }

        @keyframes animation-box7{
            0%   { transform: scale(1); }
            50%  { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .box8{
            width: 110px;
            height: 110px;
            background-color: rgb(62, 62, 170);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            animation: animation-box8 0.5s ease-in-out infinite normal;
        }

        @keyframes animation-box8{
            0%   { transform: translateY(0) rotate(0) scale(1); }
            50%  { transform: translateY(15px) rotate(180deg) scale(1.15); }
            100% { transform: translateY(0) rotate(360deg) scale(1); }
        }

        .spinner {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 6px solid rgba(255, 255, 255, 0.1);
            border-top: 6px solid #a855f7; 
            animation: spin 1s linear infinite;
            box-sizing: border-box;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            height: 110px;
        }

        .loading span{
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background-color: #a855f7;
            animation: bounce 0.6s infinite alternate ease-in-out;
        }

        .loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            50%{ transform: translateY(-25px);}
            100%{ transform: translateY(0); }
        }

        .wave{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 110px;
        }

        .wave span{
            width: 18px;
            height: 35px;
            border-radius: 3px;
            background-color: #a855f7;
            animation: wave-animation 1s infinite alternate ease-in-out;
        }

        @keyframes wave-animation{
            0%{ transform: scaleY(1); }
            50%{ transform: scaleY(2.2); }
            100%{ transform: scaleY(1); }
        }

        .wave span:nth-child(1){ animation-delay: 0.1s; }
        .wave span:nth-child(2){ animation-delay: 0.2s; background-color: white; }
        .wave span:nth-child(3){ animation-delay: 0.3s; }
        .wave span:nth-child(4){ animation-delay: 0.4s; background-color: white; }
        .wave span:nth-child(5){ animation-delay: 0.5s; }
    </style>
</head>
<body>

    <div class="body-container">
        <div class="txt1">Transform - Hover vào từng ô</div>
        <div class="container1">
            <div class="box1">Translate</div>
            <div class="box2">Rotate</div>
            <div class="box3">Scale</div>
            <div class="box4">Combine</div>
        </div>

        <div class="txt1">Overlay effect - hover vào card</div>
        <div class="container2">
            <div class="img-card">
                <div class="overlay"></div>
                <img src="avatar-dep-2.jpg" alt="img1">
            </div>
            <div class="img-card">
                <div class="overlay"></div>
                <img src="lay-anh-dai-dien-facebook-dep-24.webp" alt="img1">
            </div>
            <div class="img-card">
                <div class="overlay"></div>
                <img src="lay_anh_dai_dien_facebook_dep_58_5b495a1d8a.jpg" alt="img1">
            </div>
        </div>

        <div class="txt1">Keyframes animation</div>
        <div class="container1">
            <div class="box5">bounce</div>
            <div class="box6">spin</div>
            <div class="box7">pulse</div>
            <div class="box8">slideln</div>
        </div>

        <div class="txt1">Css loaders (pure css)</div>
        <div class="container1">
            <div class="spinner"></div>
            <div class="loading">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="wave">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>

</body>
</html>
