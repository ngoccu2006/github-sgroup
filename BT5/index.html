<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(18, 18, 35);
        }
        .body-container{
            margin-top: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: auto;
            height: auto;
            gap: 50px;
            flex-direction: column;
        }

        .container1{
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: auto;
            height: auto;
            gap: 50px;
            font-size: 24px;
        }
        .box1{
            width: 200px;
            height: 200px;
            background-color: blue;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            transform: translateX(0);
            transition: transform 0.2s ease;
        }

        .box1:hover{
            transform: translateX(50px);
        }

        .box2{
            width: 200px;
            height: 200px;
            background-color: blue;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            transform: rotate(0);
            transition: transform 0.3s ease;
        }

        .box2:hover{
            transform: rotate(45deg);
        }
        .box3{
            width: 200px;
            height: 200px;
            background-color: blue;
            border-radius: 4px;            
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            transform: scale(1);
            transition: transform 0.3s ease;
        }

        .box3:hover{
            transform: scale(1.3);
        }
        .box4{
            width: 200px;
            height: 200px;
            background-color: blue;
            border-radius: 4px;            
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            transform: rotate(0), translateY(0), scale(1);
            transition: transform 0.3s ease;
        }

        .box4:hover{
            transform: translateY(45px) scale(1.3) rotate(45deg);
        }

        .txt1{
            text-align: center;
            color: blue;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 24px;
            text-transform: uppercase;
        }


        .container2{
            margin-top: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: auto;
            height: auto;
            gap: 50px;
            position: relative;
        }

        .img-card {
            position: relative;
            width: 300px;
            height: 300px;
            overflow: hidden;
        }

        .img-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .img-card:hover .overlay {
            opacity: 1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(45, 52, 54, 0.7);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .box5{
            width: 200px;
            height: 200px;
            background-color: rgb(192, 18, 18);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            animation: animation-box5 0.4s ease-in-out infinite normal;
        }

        @keyframes animation-box5{
            0%   { transform: translateY(0); }
            50%  { transform: translateY(100px); }
            100% { transform: translateY(0); }
        }

        .box6{
            width: 200px;
            height: 200px;
            background-color: rgb(219, 219, 29);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            animation: animation-box6 1s ease-in-out infinite normal;
        }

        @keyframes animation-box6{
            0%   { transform: rotate(0); }
            50%  { transform: rotate(180deg); }
            100% { transform: rotate(360deg); }
        }

        .box7{
            width: 200px;
            height: 200px;
            background-color: rgb(12, 128, 12);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            animation: animation-box7 0.5s ease-in-out infinite normal;
        }

        @keyframes animation-box7{
            0%   { transform: scale(1); }
            50%  { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .box8{
            width: 200px;
            height: 200px;
            background-color: rgb(62, 62, 170);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            animation: animation-box8 0.5s ease-in-out infinite normal;
        }

        @keyframes animation-box8{
            0%   { transform: translateY(0) rotate(0) scale(1); }
            50%  { transform: translateY(50px) rotate(180deg) scale(1.3); }
            100% { transform: translateY(0) rotate(360deg) scale(1); }
        }

        .spinner {
        width: 200px;
        height: 200px;
        border-radius: 200px;
        border: 10px solid rgba(255, 255, 255, 0.1);
        border-top: 10px solid #a855f7; 
        animation: spin 1s linear infinite;
        }

        @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
        }

        .loading{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            height: 200px;
        }

        .loading span{
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #a855f7;
            animation: bounce 0.6s infinite alternate ease-in-out;
        }

        .loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0% {
                transform: translateY(0);
            }

            50%{
                transform: translateY(-100px);
            }

            100%{
                transform: translateY(0);
            }
        }

        .wave{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            height: 200px;
        }

        .wave span{
            width: 35px;
            height: 50px;
            border-radius: 4px;
            background-color: #a855f7;
            animation: wave-animation 1s infinite alternate ease-in-out;
        }

        @keyframes wave-animation{
            0%{
                transform: scaleY(1);
            }
            50%{
                transform: scaleY(3);
            }
            100%{
                transform: scaleY(1);
            }
        }

        .wave span:nth-child(1){
            animation-delay: 0.1s;
        }
        .wave span:nth-child(2){
            animation-delay: 0.2s;
            background-color: white;
        }
        .wave span:nth-child(3){
            animation-delay: 0.3s;
        }
        .wave span:nth-child(4){
            animation-delay: 0.4s;
            background-color: white;
        }
        .wave span:nth-child(5){
            animation-delay: 0.5s;
        }
    </style>
</head>
<body>

    <div class="body-container">
        <div class="txt1">
            Transform - Hover vào từng ô
        </div>
        <div class="container1">
            <div class="box1">Translate</div>
            <div class="box2">Rotate</div>
            <div class="box3">Scale</div>
            <div class="box4">Combine</div>
        </div>

        <div class="txt1">
                Overlay effect - hover vào card
        </div>

        <div class="container2">
            <div class="img-card">
                <div class="overlay"></div>
                <img src="avatar-dep-2.jpg" alt="img1">
            </div>

            <div class="img-card">
                <div class="overlay"></div>
                <img src="lay-anh-dai-dien-facebook-dep-24.webp" alt="img1">
            </div>

            <div class="img-card">
                <div class="overlay"></div>
                <img src="lay_anh_dai_dien_facebook_dep_58_5b495a1d8a.jpg" alt="img1">
            </div>
        </div>
        <div class="txt1">
            Keyframes animation
        </div>

        <div class="container1">
            <div class="box5">bounce</div>
            <div class="box6">spin</div>
            <div class="box7">pulse</div>
            <div class="box8">slideln</div>
        </div>

        <div class="txt1"> Css loaders (pure css) </div>

        <div class="container1">
            <div class="spinner"></div>
            <div class="loading">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div class="wave">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

    </div>
</body>
</html>
