<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2d3436;
        }
        
        .body-container {
            position: relative;
            width: 600px;
            height: 600px;
            overflow: hidden;
            cursor: pointer;
            font-family: sans-serif;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(45, 52, 54, 0.7);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .content-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .diamond-border {
            position: relative;
            width: 250px;
            height: 250px;
            border: 2px solid white;
            transform: rotate(45deg) scale(0);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            transform: rotate(-45deg); 
        }

        .icon-grid i {
            color: white;
            font-size: 28px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s ease;
        }

        .icon-grid i:nth-child(1) { transform: translate(-200px, -200px); }
        .icon-grid i:nth-child(2) { transform: translate(200px, -200px); }
        .icon-grid i:nth-child(3) { transform: translate(-200px, 200px); }
        .icon-grid i:nth-child(4) { transform: translate(200px, 200px); }

        .body-container:hover .icon-grid i {
            transform: translate(0, 0);
        }

        .icon-grid i:hover {
            color: #ecf0f1;
            transform: scale(1.2) !important;
        }

        .txt_tenderhera {
            position: absolute;
            color: white;
            font-size: 20px;
            letter-spacing: 4px;
            font-weight: 300;
            opacity: 1;
            transform: translateY(0);
            transition: all 0.4s ease;
        }

        .body-container:hover .overlay {
            opacity: 1;
        }

        .body-container:hover .diamond-border {
            opacity: 1;
            transform: rotate(45deg) scale(1);
        }

        .body-container:hover .txt_tenderhera {
            opacity: 0;
        }

    </style>
</head>
<body>

    <div class="body-container">
        <img src="profile-image.jpg" alt="src">
        
        <div class="overlay"></div>
        
        <div class="content-container">
            <div class="diamond-border">
                <div class="icon-grid">
                    <i class="fa-regular fa-file-pdf"></i>
                    <i class="fa-regular fa-image"></i>
                    <i class="fa-solid fa-file-zipper"></i>
                    <i class="fa-solid fa-code"></i>
                </div>
            </div>

            <div class="txt_tenderhera">
                TENDER<strong>HERA</strong>
            </div>
        </div>
    </div>

</body>
</html>
